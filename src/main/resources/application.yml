spring:
  application:
    name: config-service
  cloud:
    config:
      server:
        git:
          uri: https://github.com/MineShadow7/config-repo
          default-label: master
          clone-on-start: true
          basedir: target/config-repo-clone

server:
  port: 8888

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

